<head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>


<div class="product-window">

    <div class="product-header">
        <span class="product-title">Smile Shirt</span>

        <div class="window-buttons">
            <div class="btn-box">-</div>
            <div class="btn-box">+</div>
            <div class="btn-box">□</div>
        </div>
    </div>

    <div class="product-body">

        <!-- IMAGE SLIDER -->
        <div id="shirtCarousel" class="carousel slide">

            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="fotos\grayminos.jpg" class="product-image">
                </div>

                <div class="carousel-item">
                    <img src="fotos\blackminos.jpg" class="product-image">
                </div>

                <div class="carousel-item">
                    <img src="fotos\stumpOSlogo.png" class="product-image">
                </div>

            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#shirtCarousel" data-bs-slide="prev">
                ◀
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#shirtCarousel" data-bs-slide="next">
                ▶
            </button>

        </div>

        <p class="product-price">$29.99</p>

        <button class="buy-btn" onclick="addToCart('Smile Shirt', 29.99)">
            ADD TO CART
        </button>

    </div>

</div>
</body>
