<!DOCTYPE html>
<html>

<head>

    <title>Checkout</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background-color: rgb(44,44,44);">

<div class="container mt-5">

    <div class="product-window p-4">

        <h2 class="text-white">Checkout</h2>

        <div id="checkout-items"></div>

        <h4 class="text-white">
            Total: $<span id="checkout-total"></span>
        </h4>
        <form>

        <label class="text-white">Full Name</label>
        <input type="text" class="form-control mb-3" placeholder="John Doe">

        <label class="text-white">Address</label>
        <input type="text" class="form-control mb-3" placeholder="Street 123">

        <label class="text-white">City</label>
        <input type="text" class="form-control mb-3" placeholder="New York">

        <label class="text-white">Card Number</label>
        <input type="text" class="form-control mb-3" placeholder="1234 5678 9012 3456">

        <label class="text-white">Expiration Date</label>
        <input type="text" class="form-control mb-3" placeholder="MM/YY">

        <label class="text-white">CVV</label>
        <input type="text" class="form-control mb-3" placeholder="123">

        <button class="buy-btn mt-3">
            Pay Now
        </button>

    </div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("checkout-items");

let total = 0;

cart.forEach(item => {

    container.innerHTML += `
        <p class="text-white">${item.name} - $${item.price}</p>
    `;

    total += item.price;
});

document.getElementById("checkout-total").innerText = total;

</script>

</body>
</html>
