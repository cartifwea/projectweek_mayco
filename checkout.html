<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: rgb(44,44,44);">

<div class="container mt-5">
    <div class="product-window p-4">

        <h2 class="text-white">Checkout</h2>

        <div id="checkout-items"></div>

        <h4 class="text-white">
            Total: $<span id="checkout-total"></span>
        </h4>

        <form id="checkout-form">

            <input type="text" name="fullName" class="form-control mb-3" placeholder="Full Name" required>
            <input type="text" name="address" class="form-control mb-3" placeholder="Address" required>
            <input type="text" name="city" class="form-control mb-3" placeholder="City" required>

            <button type="submit" class="buy-btn mt-3">Pay Now</button>

        </form>

    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("checkout-items");

let total = 0;

cart.forEach(item => {
    container.innerHTML += `<p class="text-white">${item.name} - $${item.price}</p>`;
    total += Number(item.price);
});

document.getElementById("checkout-total").innerText = total;

document.getElementById("checkout-form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const orderData = {
        fullName: formData.get("fullName"),
        address: formData.get("address"),
        city: formData.get("city"),
        total: total,
        items: cart
    };

    await fetch("http://localhost:3000/api/orders", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(orderData)
    });

    localStorage.removeItem("cart");
    window.location.href = "success.html";
});
</script>

</body>
</html>
