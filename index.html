<!DOCTYPE html>
<html>
<head>
<title>stumpos</title>

<link rel="icon" type="image/x-icon" href="fotos/favicon.ico"></link>

<link rel="stylesheet" href="style.css"></link>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></link>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<body>

<style>
body {
    background-color: rgb(44, 44, 44);
} 
</style>


<nav class="custom-navbar p-3 text-white navbar-line">
    <div class="container">
        <div class="logo-section">
            <span class=" navbar-font">
                st u m pOS 2. 0 
            </span>
            <div class="square">
                <div class="news-text">
                    gabriel says minos milky wilky is his fav shirt
                </div>
            </div>
            <img src="fotos/buttonsminplus.png" class="img-fluid" width="150" height="150">
            <div class="cart-font" onclick="toggleCart()">
                🛒 Cart (<span class="cart-font" id="cart-count">0</span>)
            </div>
            <div id="cart-panel" class="cart-panel">

                <h3>Your Cart</h3>

                    <div id="cart-items"></div>

                    <p>Total: $<span id="cart-total">0</span></p>

                    <a href="checkout.html" class="buy-btn">
                        Checkout
                    </a>

            </div>
            

            
        </div>
        
    </div>
</nav>




<img src="fotos\stumpOSlogo.png" class="img-fluid">


<div class="container mt-4">
    <div class="row g-4">
        <div class="col-md-4">
            <!-- product 1 -->
            <div class="product-window">
                <div class="product-header">
                    <span class="product-title">minos milky wilky prime</span>
                    <div class="window-buttons">
                        <img src="fotos/buttonsminplus.png" class="img-fluid" width="80" height="80">
                    </div>
                </div>

                <div class="product-body">
                    <div id="shirtCarousel" class="carousel slide">
                        <div class="carousel-inner">

                            <div class="carousel-item active">
                                <img src="fotos\unisex-garment-dyed-t-shirt.jpg" class="product-image">
                            </div>

                            <div class="carousel-item">
                                <img src="fotos\grayminos.jpg" class="product-image">
                            </div>

                            <div class="carousel-item">
                                <img src="fotos\blackminos.jpg" class="product-image">
                            </div>

                        </div>

                        <button class="carousel-control-prev" type="button" data-bs-target="#shirtCarousel" data-bs-slide="prev">
                            ◀
                        </button>

                        <button class="carousel-control-next" type="button" data-bs-target="#shirtCarousel" data-bs-slide="next">
                            ▶
                        </button>

                    </div>

                    <p class="product-price">$29.99</p>

                    <button class="buy-btn" onclick="addToCart('minos milky wilky prime shirt', 29.99)">
                        ADD TO CART
                    </button>

                </div>

            </div>
        </div>    
        <div class="col-md-4">
            <!-- product 4 -->
            <div class="product-window">
                <div class="product-header">
                    <span class="product-title">stumpOS shirt</span>
                    <div class="window-buttons">
                        <img src="fotos/buttonsminplus.png" class="img-fluid" width="80" height="80">

                    </div>
                </div>

                <div class="product-body">
                    <div id="shirtCarousel2" class="carousel slide">

                        <div class="carousel-inner">

                            <div class="carousel-item active">
                                <img src="fotos\osshirt.png" class="product-image">
                            </div>

                            <div class="carousel-item">
                                <img src="fotos\stumposed.png" class="product-image">
                            </div>

                            <div class="carousel-item">
                                <img src="fotos\sumposkaki.png" class="product-image">
                            </div>

                        </div>

                        <button class="carousel-control-prev" type="button" data-bs-target="#shirtCarousel2" data-bs-slide="prev">
                            ◀
                        </button>

                        <button class="carousel-control-next" type="button" data-bs-target="#shirtCarousel2" data-bs-slide="next">
                            ▶
                        </button>

                    </div>

                    <p class="product-price">$49.99</p>

                    <button class="buy-btn" onclick="addToCart('stumpOS shirt', 49.99)">
                        ADD TO CART
                    </button>

                </div>

            </div>
        </div>
        <div class="col-md-4">
            <!-- product 2 -->
            <div class="product-window">
                <div class="product-header">
                    <span class="product-title">mik mik</span>
                    <div class="window-buttons">
                        <img src="fotos/buttonsminplus.png" class="img-fluid" width="80" height="80">
                    </div>
                </div>

                <div class="product-body">
                    <img src="fotos\andrew-tate-mik-mik.gif" class="product-image">
                    <p class="product-price">$99999999999999999999999999999999999.99</p>
                    <button class="buy-btn" onclick="addToCart('mik mik', 99999999999999999999999999999999999.99)">
                        ADD TO CART
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<div class="music-corner text-center mt-5 mb-5">

    <a href="music.html" class="music-btn">
        🎵 Enter Music Corner
    </a>

</div>

<script src="litty.js"></script>

<div id="ads-container"></div>
